name: scrape

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *'

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Restore previous data branch
        run: |
          mkdir -p public/data
          if git ls-remote --heads origin data | grep -q data; then
            git fetch origin data --depth=1
            git --work-tree=public/data checkout origin/data -- .
          fi

      - name: Run scraper
        run: node --max-old-space-size=8192 scripts/ingest-questionbank.mjs

      - name: Publish to data branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd public/data
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b data
          git add -A
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -q -m "scrape $(date -u +%FT%TZ)"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push -f origin data
